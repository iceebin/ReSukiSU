name: Sync with Upstream

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/SukiSU-Ultra/SukiSU-Ultra.git || true
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          # Get the latest commit from upstream main branch
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          # Get the merge base between current branch and upstream
          MERGE_BASE=$(git merge-base HEAD upstream/main)

          if [ "$MERGE_BASE" = "$UPSTREAM_COMMIT" ]; then
            echo "No updates from upstream"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Updates available from upstream"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        run: |
          # Try to merge upstream changes
          if git merge upstream/main --no-edit \
            -m "chore: sync with upstream SukiSU-Ultra"; then
            echo "merge_success=true" >> $GITHUB_OUTPUT
          else
            echo "merge_success=false" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Create Pull Request
        if: |
          steps.check.outputs.has_updates == 'true' &&
          steps.merge.outputs.merge_success == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-upstream
          delete-branch: true
          title: 'chore: sync with upstream SukiSU-Ultra'
          body: |
            ## Upstream Sync

            This PR automatically syncs the latest changes from the upstream
            repository [SukiSU-Ultra/SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra).

            **Upstream commit:** ${{ steps.check.outputs.upstream_commit }}

            Please review the changes before merging.

            ---
            *This PR was created automatically by the sync-upstream workflow*
          labels: upstream, sync
          draft: false

      - name: Create issue on conflict
        if: |
          steps.check.outputs.has_updates == 'true' &&
          steps.merge.outputs.merge_success == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed due to merge conflicts',
              body: `## Upstream Sync Failed

            The automatic sync with upstream failed due to merge conflicts.

            **Upstream commit:** ${{ steps.check.outputs.upstream_commit }}

            Please manually sync the upstream changes:

            \`\`\`bash
            git remote add upstream https://github.com/SukiSU-Ultra/SukiSU-Ultra.git
            git fetch upstream
            git merge upstream/main
            # Resolve conflicts
            git push
            \`\`\``,
              labels: ['upstream', 'conflict']
            })
